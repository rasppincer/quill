# Default Writing Workflow

name: default
description: Multi-stage writing pipeline for long-form content

stage_inputs:
  structure:
    - brief.md
  outline:
    - brief.md
  research:
    - outline.md
    - brief.md
  draft:
    - outline.md
    - brief.md
    - research.md
  revise:
    - draft.md
    - review.md
  humanize:
    - revise.md
  polish:
    - humanize.md
    - validate.md
  summary:
    - polish.md

stages:
  - key: brief
    name: Brief
    description: Define what you're writing
    required_fields:
      - title
      - genre
      - type
      - audience
      - tone
      - language
      - target_length
    next: structure

  - key: structure
    name: Structure
    description: Auto-segment content based on target length
    rules:
      - correct_segment_count
      - titles_only
    next: outline
    can_reject_to: brief

  - key: outline
    name: Outline
    description: Structure before prose
    required_artifacts:
      - section_list
      - pacing_notes
    next: research
    can_reject_to:
      - brief
      - structure

  - key: research
    name: Research
    description: Fetch reference material from the web
    next: draft
    can_reject_to: outline

  - key: draft
    name: Draft
    description: Write in chunks
    rules:
      - write_chunk_then_verify
      - no_truncation_artifacts
    next: review
    can_reject_to: outline

  - key: review
    mode: feedback
    name: Review
    description: Read, annotate, flag issues
    rules:
      - pacing_check
      - logic_check
      - character_consistency
      - completeness_vs_outline
      - redundancy_scan
    next: revise
    can_reject_to: draft

  - key: revise
    name: Revise
    description: Apply review feedback to produce revised draft
    rules:
      - apply_review_comments
      - preserve_voice
      - atomic_changes
    next: humanize
    can_reject_to:
      - review
      - draft

  - key: humanize
    name: Humanize
    description: Strip AI-isms, inject personality
    rules:
      - check_29_patterns
      - anti_ai_audit_pass
      - voice_calibration
    next: validate
    can_reject_to: revise

  - key: validate
    mode: feedback
    name: Validate
    description: Domain-specific fact checking
    rules:
      - domain_accuracy
      - consistency_check
      - language_quality
    next: polish
    can_reject_to:
      - humanize
      - revise

  - key: polish
    name: Polish
    description: Final line-level edits
    rules:
      - title_and_opening
      - final_word_count
      - formatting
    next: summary
    can_reject_to: validate

  - key: summary
    name: Summary
    description: Compressed summary for context passing
    rules:
      - preserve_key_elements
      - tight_compression
    next: done
    can_reject_to: polish

  - key: done
    name: Done
    description: Piece is complete
