# Global Model Configuration
# This is the single source of truth for which LLM API and model to use.
# Agent sets define prompts and per-stage behavior; model selection lives here.
# Override via dashboard Agents tab or edit directly.
#
# API key is NOT stored here — set via environment variable:
#   QUILL_API_KEY=your-key-here  (in .env file or systemd Environment=)
# Falls back to empty string if not set (works for local LLMs).

api_base: "http://192.168.0.3:1234/v1"
model: "google/gemma-4-e4b"
temperature: 0.7
max_tokens: 4096
