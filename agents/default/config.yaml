description: Generic agents — works for any genre or type
temperature: 0.7
max_tokens: 12288
max_loops: 3
chain_retry: 1
trigger: auto
research:
  enabled: true
  required: false
stages:
  outline:
    name: Outline Agent
    description: Generates structured outline from brief
    temperature: 0.5
  draft:
    name: Draft Agent
    description: Produces full draft from outline and brief
    temperature: 0.7
  review:
    name: Review Agent
    description: Structural critique — organization, completeness, clarity
    temperature: 0.5
  revise:
    name: Revise Agent
    description: Applies review feedback to produce revised text
    temperature: 0.6
  humanize:
    name: Humanize Agent
    description: Strips AI patterns, scores human-ness
    temperature: 0.4
  validate:
    name: Validate Agent
    description: Checks factual accuracy, consistency, logic
    temperature: 0.2
  polish:
    name: Polish Agent
    description: Final line-level edits, readability, rhythm
    temperature: 0.3
