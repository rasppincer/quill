# Fiction Agent Set
# Prompts optimized for fiction: stories, novels, flash fiction, creative writing.
# Focuses on narrative structure, character consistency, pacing, world-building.

description: "Fiction agents — stories, novels, flash fiction, creative writing"
temperature: 0.7
max_tokens: 12288
max_loops: 3
trigger: "on_advance"
research:
  enabled: true
  required: false  # fiction: user can skip research

stages:
  outline:
    name: "Outline Agent"
    description: "Generates fiction outline — narrative structure, character arcs, pacing"
    temperature: 0.5
  draft:
    name: "Draft Agent"
    description: "Produces full fiction draft — vivid prose, dialogue, show-don't-tell"
    temperature: 0.7
  review:
    name: "Review Agent"
    description: "Narrative critique — pacing, character, plot, world-building"
    temperature: 0.5

  revise:
    name: "Revise Agent"
    description: "Applies narrative feedback to produce revised draft"
    temperature: 0.6

  humanize:
    name: "Humanize Agent"
    description: "Strips AI patterns from fiction prose"
    temperature: 0.4

  validate:
    name: "Validate Agent"
    description: "Checks character consistency, timeline, internal logic"
    temperature: 0.2

  polish:
    name: "Polish Agent"
    description: "Final prose polish — rhythm, word choice, voice"
    temperature: 0.3
